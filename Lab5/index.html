<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Tip Calculator</h1>
    </header>
    <div class="container">
        <div class="currency-info">
            <p>Currency conversion:</p>
            <p>$1 USD = 0.85 EUR</p>
            <p>$1 USD = 92.43 INR</p>
        </div>
        <div class="input-section">
            <label for="bill">Bill Total:$</label>
            <input type="number" id="bill" placeholder="Enter total bill">
            <label for="tax">Total Bill with tax (11%):</label>
            <input type="text" id="tax" readonly>
        </div>
        <div class="currency-input">
            <label for="toCurrency">Select Currency:</label>
            <select id="toCurrency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="INR">INR (₹)</option>
            </select>
        </div>
        <div class="tip">
            <label for="tip">Tip Amount:</label>
            <input type="range" id="tip" placeholder="Enter tip amount" min="0" max="100" value ="15">
                <span id="tipValue">15</span>
        </div>
        <div class="result-section">
            <label for="tipResult">Converted Tip Amount:</label>
            <input type="text" id="tipResult" readonly>
            <label for="TotalBill">Converted Total Bill with Tip and Tax:</label>
            <input type="text" id="TotalBill" readonly>
        </div>
        <button id="convertButton">Convert</button>
        <div id="result"></div>
    </div>
</body>
</html>
</html>
