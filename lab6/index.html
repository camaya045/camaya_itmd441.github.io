<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise & Sunset Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <h1>Sunrise & Sunset Dashboard</h1>

    <div class ="options">
        <select id="locationSelect">
            <option value="">Select location</option>
            <option value="13.6929, -89.2182">San Salvador, El Salvador</option>
            <option value="47.6062, -122.3321">Seattle, Washington</option>
            <option value="40.7128, -74.0060">New York, New York</option>
            <option value="41.8781, -87.6298">Chicago, Illinois</option>
            <option value="29.7604, -95.36898">Houston, Texas</option>
            <option value="34.0522, -118.2437">Los Angeles, California</option>
            <option value="35.6762, 139.6503">Tokyo, Japan</option>
            <option value="19.4326, -99.1332">Mexico City, Mexico</option>
            <option value="40.4168, -3.7038">Madrid, Spain</option>
            <option value="51.5074, -0.1278">London, UK</option>
        </select>

        <button onclick="getSunriseSunset()">Get Report</button>

    </div>

    <div id="dashboard">
        <div class="card">
            <h2>Today</h2>
            <div id="today-report">
                <p>Sunrise: </p>
                <p>Sunset: </p>
                <p>Dawn: </p>
                <p>Dusk: </p>
                <p>Solar Noon: </p>
                <p>Day Length: </p>
                <p>Timezone: </p>
            </div>
        </div>

        <div class="card">
            <h2>Tomorrow</h2>
            <div id="tomorrow-report">
                <p>Sunrise: </p>
                <p>Sunset: </p>
                <p>Dawn: </p>
                <p>Dusk: </p>
                <p>Solar Noon: </p>
                <p>Day Length: </p>
                <p>Timezone: </p>
            </div>
        </div>
    </div>

    <footer>
        <p>Data provided by <a href="https://sunrisesunset.io/api/" target="_blank">SunriseSunset.io API</a></p>
    </footer>
</body>
</html>
